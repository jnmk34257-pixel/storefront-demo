<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Conference Event Website</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN">
    <link rel="stylesheet" href="css/styles.css">
</head>

<!--DRY - do not repeat yourself-->
<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Conference Event Website</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                    <a class="nav-link" aria-current="page" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link active" href="signup.html">SignUp</a>
                    </li>
                </ul>
                <!--<ul class="d-flex navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                    <a class="nav-link" href="#">Cart</a>
                    </li>
                </ul> -->
            </div>
        </div>
    </nav>

    <div class="container my-5 p-10">
        <div class="card p-4 md-4">
            <h2 class="text-center mb-4">Sign Up</h2>

            <form class="row g-3 needs-validation" novalidate>

                <div class="col-md-6">
                    <label for="firstName" class="form-label">First name</label>
                    <input type="text" class="form-control" id="firstName" name="firstName" placeholder="John" autocomplete="off" required>
                
                </div>

                <div class="col-md-6">
                    <label for="lastName" class="form-label">Last name</label>
                    <input type="text" class="form-control" id="lastName" name="lastName" placeholder="Doe" autocomplete="off" required>
                
                </div>

                <div class="col-md-6">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="@john_doe@example.com" autocomplete="off"autocomplete="off"required>
                </div>

                <div class="col-md-6">
                    <label for="phone" class="form-label">Phone</label>
                    <input type="tel" class="form-control" id="phone" name="phone" placeholder="123-456-7890" autocomplete="off" required>
                </div>

                <div class="col-md-6">
                    <label for="street" class="form-label">Street Address</label>
                    <input type="street" class="form-control" id="street" name="street" autocomplete="off" required>
                </div>

                <div class="col-md-2">
                    <label for="city" class="form-label">City</label>
                    <input type="city" class="form-control" id="city" name="city" autocomplete="off" required>
                </div>

                <div class="col-md-2">
                    <label for="state" class="form-label">State</label>
                    <select class="form-select" id="state" required>
                    <option value="">Choose...</option>
                    <option value="PA">Pennsylvannia</option>
                    <option value="NY">New York</option>
                    <option value="CA">California</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label for="zip" class="form-label">Zip</label>
                    <input type="zip" class="form-control" id="zip" name="zip" required>
                </div>
            
                <div class="col-12">
                    <button class="btn btn-primary" type="submit">Sign Up</button>
                    <button class="btn btn-secondary" type="reset">Reset</button>

                </div>
            </form>
        </div>    
    </div>



    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p>&copy; @2026 Conference Event Website | IST 256 Group 3</p>
    </footer>
</body>

</html>
