<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Conference Event Website</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Conference Event Website</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                    <a class="nav-link" aria-current="page" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link active" href="signup.html">SignUp</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5 p-10">
        <div class="card p-4 md-4">
            <h2 class="text-center mb-4">Sign Up</h2>

            <form id="signupForm" class="row g-3 needs-validation" novalidate>
                <input type="hidden" id="editIndex" value="-1">

                <div class="col-md-6">
                    <label for="firstName" class="form-label">First name</label>
                    <input type="text" class="form-control" id="firstName" name="firstName" placeholder="John" autocomplete="off" required>
                </div>

                <div class="col-md-6">
                    <label for="lastName" class="form-label">Last name</label>
                    <input type="text" class="form-control" id="lastName" name="lastName" placeholder="Doe" autocomplete="off" required>
                </div>

                <div class="col-md-6">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="john_doe@example.com" autocomplete="off" required>
                </div>

                <div class="col-md-6">
                    <label for="phone" class="form-label">Phone</label>
                    <input type="tel" class="form-control" id="phone" name="phone" placeholder="123-456-7890" autocomplete="off" required>
                </div>
            
                <div class="col-12">
                    <button id="submitBtn" class="btn btn-primary" type="submit">Sign Up</button>
                    <button class="btn btn-secondary" type="button" onclick="resetForm()">Reset</button>
                </div>
            </form>
        </div>    

        <h3 class="text-white text-center mt-5 mb-4">Registered Attendees</h3>
        <div id="userCardContainer" class="row g-4 mb-5 pb-5"></div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p>&copy; @2026 Conference Event Website | IST 256 Group 3</p>
    </footer>

    <script src="js/storage.js"></script>
    <script src="js/validation.js"></script>
</body>

</html>
