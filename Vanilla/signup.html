<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Conference Event Website</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Conference Event Website</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                    <a class="nav-link" aria-current="page" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link active" href="signup.html">SignUp</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="events.html">Events</a>
                    </li>
                </ul>
                 <ul class="d-flex navbar-nav mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link active" href="cart.html">My Schedule (Cart)</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5 p-10">
        <div class="card p-4 md-4">
            <h2 class="text-center mb-4">Sign Up</h2>

            <form id="signupForm" class="row g-3 needs-validation" novalidate>
                <input type="hidden" id="editIndex" value="-1">

                <div class="col-md-6">
                    <label for="firstName" class="form-label">First name</label><strong class="text-danger">*</strong>
                    <input type="text" class="form-control" id="firstName" name="firstName" placeholder="John" autocomplete="off" required>
                </div>

                <div class="col-md-6">
                    <label for="lastName" class="form-label">Last name</label><strong class="text-danger">*</strong>
                    <input type="text" class="form-control" id="lastName" name="lastName" placeholder="Doe" autocomplete="off" required>
                </div>

                <div class="col-md-6">
                    <label for="email" class="form-label">Email</label><strong class="text-danger">*</strong>
                    <input type="email" class="form-control" id="email" name="email" placeholder="john_doe@example.com" autocomplete="off" required>
                </div>

                <div class="col-md-6">
                    <label for="phone" class="form-label">Phone</label>
                    <input type="tel" class="form-control" id="phone" name="phone" placeholder="123-456-7890" autocomplete="off">
                </div>

                <div class="col-md-6">
                    <label for="age" class="form-label">Age</label><strong class="text-danger">*</strong>
                    <input type="number" class="form-control" id="age" name="age" placeholder="20" autocomplete="off" required>
                </div>

                <div class="col-md-6">
                    <label for="institution" class="form-label">Institution</label><strong class="text-danger">*</strong>
                    <input type="text" class="form-control" id="institution" name="institution" placeholder="Penn State University" autocomplete="off" required>
                </div>

                <div class="col-md-12">
                    <label for="street" class="form-label">Street Address <strong class="text-danger">*</strong></label>
                    <input type="text" class="form-control" id="street" name="street" autocomplete="off" required>
                </div>

                <div class="col-md-4">
                    <label for="city" class="form-label">City <strong class="text-danger">*</strong></label>
                    <input type="text" class="form-control" id="city" name="city" autocomplete="off" required>
                </div>

                <div class="col-md-4">
                    <label for="state" class="form-label">State <strong class="text-danger">*</strong></label>
                    <select class="form-select" id="state" name="state" required>
                    <option value="">Choose...</option>
                    <option value="AL">Alabama</option>
                    <option value="AK">Alaska</option>
                    <option value="AZ">Arizona</option>
                    <option value="AR">Arkansas</option>
                    <option value="CA">California</option>
                    <option value="CO">Colorado</option>
                    <option value="CT">Connecticut</option>
                    <option value="DE">Delaware</option>
                    <option value="FL">Florida</option>
                    <option value="GA">Georgia</option>
                    <option value="HI">Hawaii</option>
                    <option value="ID">Idaho</option>
                    <option value="IL">Illinois</option>
                    <option value="IN">Indiana</option>
                    <option value="IA">Iowa</option>
                    <option value="KS">Kansas</option>
                    <option value="KY">Kentucky</option>
                    <option value="LA">Louisiana</option>
                    <option value="ME">Maine</option>
                    <option value="MD">Maryland</option>
                    <option value="MA">Massachusetts</option>
                    <option value="MI">Michigan</option>
                    <option value="MN">Minnesota</option>
                    <option value="MS">Mississippi</option>
                    <option value="MO">Missouri</option>
                    <option value="MT">Montana</option>
                    <option value="NE">Nebraska</option>
                    <option value="NV">Nevada</option>
                    <option value="NH">New Hampshire</option>
                    <option value="NJ">New Jersey</option>
                    <option value="NM">New Mexico</option>
                    <option value="NY">New York</option>
                    <option value="NC">North Carolina</option>
                    <option value="ND">North Dakota</option>
                    <option value="OH">Ohio</option>
                    <option value="OK">Oklahoma</option>
                    <option value="OR">Oregon</option>
                    <option value="PA">Pennsylvania</option>
                    <option value="RI">Rhode Island</option>
                    <option value="SC">South Carolina</option>
                    <option value="SD">South Dakota</option>
                    <option value="TN">Tennessee</option>
                    <option value="TX">Texas</option>
                    <option value="UT">Utah</option>
                    <option value="VT">Vermont</option>
                    <option value="VA">Virginia</option>
                    <option value="WA">Washington</option>
                    <option value="WV">West Virginia</option>
                    <option value="WI">Wisconsin</option>
                    <option value="WY">Wyoming</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label for="zip" class="form-label">Zip <strong class="text-danger">*</strong></label>
                    <input type="text" class="form-control" id="zip" name="zip" autocomplete="off" required>
                    <div class="text-danger" id="zipError"></div>
                </div>

                <div class="col-12">
                    <button id="submitBtn" class="btn btn-primary" type="submit">Sign Up</button>
                    <button class="btn btn-secondary" type="button" onclick="resetForm()">Reset</button>
                </div>
            </form>
        </div>    

       <div class="row mt-5 mb-4 align-items-end"> 
            <div class="col-md-4">
                <h3 class="text-white mb-0">Registered Attendees</h3>
            </div>
            
            <div class="col-md-5 position-relative" id="searchContainer">
                <input type="text" id="attendeeSearch" class="form-control" placeholder="Search attendees by name or institution..." autocomplete="off">
                <ul class="list-group position-absolute w-100 shadow" id="suggestionBox" style="display: none; z-index: 1000; max-height: 200px; overflow-y: auto;"></ul>
            </div>

            <div class="col-md-3 text-end">
                <button class="btn btn-info" onclick="exportToJsonFile()">Export to JSON</button>
            </div>
        </div>

        <div id="userCardContainer" class="row g-4 mb-5 pb-5"></div>
    </div> 

    
    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p>&copy; @2026 Conference Event Website | IST 256 Group 3</p>
    </footer>

    <script src="js/storage.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/search.js"></script>
</body>

</html>
